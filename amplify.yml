version: 1
# ============================================================
# AWS Amplify Hosting — monorepo, the UI lives in ui/
# NOTE: the fieldsight-pipeline AWS account (509194952652) has NO Amplify.
# On that account the UI ships via S3 + CloudFront → use scripts/deploy-ui.sh.
# This file is ONLY for an account where an Amplify app IS connected to this
# repo (e.g. the company account / FS migration): develop→TEST, main→PROD,
# per-branch console env vars feed the runtime config below.
# ============================================================
applications:
  - appRoot: ui
    frontend:
      phases:
        preBuild:
          commands:
            # Generate runtime config from Amplify console env vars (per branch).
            # No build step — this is a static HTML/CSS/in-browser-React prototype.
            - |
              cat > scripts/env-config.js <<EOF
              /* generated by amplify.yml at build — do not commit */
              window.FS_RUNTIME = {
                apiBaseUrl: "${API_BASE_URL}",
                cognitoClientId: "${COGNITO_CLIENT_ID}",
                cognitoHostedUiDomain: "${COGNITO_HOSTED_UI_DOMAIN}",
                useMocks: false
              };
              window.FS_COGNITO_CONFIG = {
                clientId: "${COGNITO_CLIENT_ID}",
                hostedUiDomain: "${COGNITO_HOSTED_UI_DOMAIN}"
              };
              EOF
        build:
          commands:
            - echo "Static UI — no build; env-config.js generated in preBuild."
      artifacts:
        baseDirectory: /
        files:
          - '**/*'
      cache:
        paths: []
