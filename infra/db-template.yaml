AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FieldSight Aurora Serverless v2 (PostgreSQL 16 + pgvector) — dedicated DB stack.
  Deployed separately from the app stack (src/template.yaml) so DB lifecycle
  (create/rotate/pause/delete) never shares blast radius with app deploys.
  Plain CloudFormation — no SAM transform needed (no Lambda/API resources here).

# ============================================================
# Parameters
# ============================================================
Parameters:
  Stage:
    Type: String
    Default: test
    AllowedValues: [test, prod]
    Description: Deployment stage. Only 'test' is provisioned in Phase 2B.

  DBName:
    Type: String
    Default: fieldsight
    Description: Initial database name created on the cluster.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to place the Aurora cluster and security groups in (default VPC).

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Subnet ids for the DB subnet group (>=2 AZs required by RDS).
      Pass the 3 default-VPC subnets via samconfig parameter_overrides — never
      hardcode account-specific subnet ids in this template.

  # --- Phase 3: VPC endpoints for in-VPC org Lambdas (no NAT in this VPC) ---
  EndpointSubnetIds:
    Type: String
    Default: ''
    Description: >
      Comma-separated subnet ids to place the cognito-idp INTERFACE endpoint
      ENIs in. ONE subnet keeps cost ~$8/month (an interface endpoint bills
      per-AZ; private DNS serves the whole VPC regardless of which subnet the
      ENI lives in). Pass all 3 for AZ redundancy. Empty (default) skips
      endpoint creation — pre-Phase-3 deploys are unaffected.

  RouteTableIds:
    Type: String
    Default: ''
    Description: >
      Comma-separated route table ids for the S3 GATEWAY endpoint (free).
      Default-VPC subnets normally use the main route table; find it with
      aws ec2 describe-route-tables
        --filters Name=vpc-id,Values=<vpc> Name=association.main,Values=true
        --query 'RouteTables[0].RouteTableId'.
      Empty (default) skips the S3 endpoint.

Conditions:
  HasEndpointSubnets: !Not [!Equals [!Ref EndpointSubnetIds, '']]
  HasRouteTables: !Not [!Equals [!Ref RouteTableIds, '']]

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # Security Groups
  # ----------------------------------------------------------
  # Lambda-side SG: no ingress rules (Lambdas don't need to accept inbound
  # traffic), egress-all so it can reach the DB (and anything else it needs).
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub fieldsight-lambda-sg (${Stage}) - egress-only, attached to in-VPC Lambdas
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (DB + any future in-VPC calls)
      Tags:
        - Key: Name
          Value: !Sub fieldsight-lambda-sg-${Stage}

  # DB-side SG: ingress 5432 ONLY from LambdaSG (source = security group, not CIDR).
  DbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub fieldsight-db-sg (${Stage}) - ingress 5432 from LambdaSG only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !GetAtt LambdaSG.GroupId
          Description: Postgres from FieldSight in-VPC Lambdas
      Tags:
        - Key: Name
          Value: !Sub fieldsight-db-sg-${Stage}

  # ----------------------------------------------------------
  # VPC Endpoints (Phase 3 — org Lambdas run in-VPC with no NAT;
  # any AWS API call without an endpoint black-holes to timeout, BUG-36)
  # ----------------------------------------------------------
  # Endpoint-side SG: allow HTTPS only from in-VPC Lambdas (LambdaSG).
  VpcEndpointSG:
    Type: AWS::EC2::SecurityGroup
    Condition: HasEndpointSubnets
    Properties:
      GroupDescription: !Sub fieldsight-vpce-sg (${Stage}) - ingress 443 from LambdaSG only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !GetAtt LambdaSG.GroupId
          Description: HTTPS from FieldSight in-VPC Lambdas
      Tags:
        - Key: Name
          Value: !Sub fieldsight-vpce-sg-${Stage}

  # cognito-idp interface endpoint: OrgApiFunction calls AdminCreateUser /
  # ListUsers from inside the VPC. PrivateDnsEnabled makes the regular SDK
  # endpoint hostname resolve to the ENI — no code changes needed.
  CognitoIdpEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasEndpointSubnets
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.cognito-idp
      VpcId: !Ref VpcId
      SubnetIds: !Split [',', !Ref EndpointSubnetIds]
      SecurityGroupIds:
        - !GetAtt VpcEndpointSG.GroupId
      PrivateDnsEnabled: true

  # S3 gateway endpoint (free): org seed reads config/user_mapping.json from
  # the data bucket. Gateway endpoints attach to route tables, not subnets.
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: HasRouteTables
    Properties:
      VpcEndpointType: Gateway
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcId: !Ref VpcId
      RouteTableIds: !Split [',', !Ref RouteTableIds]

  # ----------------------------------------------------------
  # DB Subnet Group
  # ----------------------------------------------------------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub Subnet group for fieldsight-db-${Stage} (default VPC subnets)
      SubnetIds: !Ref SubnetIds

  # ----------------------------------------------------------
  # Aurora Serverless v2 Cluster (PostgreSQL 16, pgvector-capable)
  # ----------------------------------------------------------
  DbCluster:
    # test stack: no data yet -> Delete is intentional; prod stack must use Snapshot
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      # 16.4+ is required for ServerlessV2ScalingConfiguration MinCapacity 0
      # (scale-to-zero). scale-to-zero requires 16.3+; 16.4 pinned for margin.
      EngineVersion: '16.4'
      EngineMode: provisioned
      DatabaseName: !Ref DBName
      MasterUsername: postgres
      ManageMasterUserPassword: true
      DBSubnetGroupName: !Ref DbSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DbSG.GroupId
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0
        MaxCapacity: 2
      EnableHttpEndpoint: true
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub fieldsight-db-${Stage}

  # ----------------------------------------------------------
  # Serverless v2 DB Instance (writer)
  # ----------------------------------------------------------
  DbInstance:
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-postgresql
      DBInstanceClass: db.serverless
      DBClusterIdentifier: !Ref DbCluster
      DBSubnetGroupName: !Ref DbSubnetGroup
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub fieldsight-db-${Stage}-instance

# ============================================================
# Outputs (Exports consumed by src/template.yaml MigrateFunction)
# ============================================================
Outputs:
  ClusterEndpoint:
    Description: Aurora cluster writer endpoint (host only)
    Value: !GetAtt DbCluster.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-ClusterEndpoint'

  ClusterArn:
    Description: Aurora cluster ARN (for Data API / rds-data calls)
    Value: !Sub arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${DbCluster}
    Export:
      Name: !Sub '${AWS::StackName}-ClusterArn'

  SecretArn:
    Description: RDS-managed master user secret ARN (Secrets Manager)
    Value: !GetAtt DbCluster.MasterUserSecret.SecretArn
    Export:
      Name: !Sub '${AWS::StackName}-SecretArn'

  DbSG:
    Description: Security group id for the DB (ingress 5432 from LambdaSG)
    Value: !GetAtt DbSG.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-DbSG'

  LambdaSG:
    Description: Security group id to attach to in-VPC Lambdas that talk to the DB
    Value: !GetAtt LambdaSG.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-LambdaSG'

  DbName:
    Description: Database name created on the cluster
    Value: !Ref DBName
    Export:
      Name: !Sub '${AWS::StackName}-DbName'
