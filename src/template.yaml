AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  FieldSight Pipeline v2 - Auto download files to S3, transcribe, and generate reports.
  Uses web scraping endpoints (realptt.com) for complete data extraction. Includes Fargate, VAD, API, and meeting minutes.
  Includes Fargate for large file downloads that exceed Lambda 15-min limit.

# W1030 (Phase 2B): DbSubnetIds' Default: '' is flagged against the subnet-id
# pattern cfn-lint infers from MigrateFunction's VpcConfig.SubnetIds. That
# default only resolves when HasDb is false (MigrateFunction not created —
# DbStackName unset); real subnet ids are always supplied via
# parameter-overrides whenever DbStackName is set. Parameters have no
# per-item Metadata, so this is suppressed template-wide (the only
# List/CommaDelimitedList param with an empty default in this template).
#
# W1001 (Phase 5): AskAgentFunction (unconditional) Refs RagSearchFunction
# (Condition: HasDb) in its RAG_SEARCH_FUNCTION env var and in the
# LambdaInvokePolicy SAM synthesizes into AskAgentFunctionRole -- the latter
# is a transform-generated resource we cannot attach a resource-level
# ignore_checks Metadata to directly, so this is suppressed template-wide
# instead (4 matches at time of writing: RAG_SEARCH_FUNCTION env +
# LambdaInvokePolicy, and the same pair for VOICE_AUDIT_FUNCTION / SP-Ask
# Task 6's VoiceAuditFunction, added the same way for the same reason).
# Accepted because it is inert in practice: both real SAM deploy targets
# (TEST via deploy.yml, and PROD=fieldsight-prod via deploy-prod.yml) always
# pass DbStackName/DbSecretArn/OrgUserPoolId together, so HasDb is always
# true wherever this template is actually applied. The legacy hand-built
# fieldsight-* lambdas remain OUTSIDE CFN (never SAM-managed).
# AskAgentFunction is deliberately kept
# unconditional (not gated on HasDb) so its legacy S3-file Q&A mode keeps
# working standalone if a future deploy target omits the DB.
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1030
        - W1001

# ============================================================
# Parameters - Configure during deployment
# ============================================================
Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [test, prod]
    Description: Deployment stage. prod deploys fieldsight-prod-*; test deploys fieldsight-test-*. Legacy hand-built fieldsight-* lambdas are NOT CFN-managed.
  EnableSchedules:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Disable in test to avoid polling RealPTT / generating reports on cron.
  RealPTTAccount:
    Type: String
    Description: RealPTT platform account (external service)
    NoEcho: false

  RealPTTPassword:
    Type: String
    Description: RealPTT platform password (external service)
    NoEcho: true

  DataBucketName:
    Type: String
    Description: Existing S3 bucket name (created outside this stack)
    Default: fieldsight-data-509194952652

  IngestBucketName:
    Type: String
    Default: fieldsight-data-509194952652
    Description: >-
      Bucket the ingest lambda reads (Phase 4a). This is the REAL data lake
      (prod, hand-assembled pipeline writes reports/transcripts here) — NOT
      DataBucketName, which is the test stack's own bucket with an empty
      reports/ prefix. Aurora (fieldsight-db-test) is the single org DB both
      environments share, so ingest bridges lake -> Aurora. The S3 event
      notification for this bucket is managed MANUALLY (the lake bucket's
      notifications are hand-managed alongside vad/transcribe; wire-s3-events.sh
      only manages DataBucketName).

  StartDaysAgo:
    Type: Number
    Description: Query data from N days ago
    Default: 1
    MinValue: 1
    MaxValue: 30

  DownloadAudio:
    Type: String
    Description: Download audio files
    Default: 'true'
    AllowedValues: ['true', 'false']

  DownloadVideo:
    Type: String
    Description: Download video files
    Default: 'true'
    AllowedValues: ['true', 'false']

  DownloadFiles:
    Type: String
    Description: Download uploaded files (photos, body cam, etc.)
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableTranscribe:
    Type: String
    Description: Enable speech-to-text transcription
    Default: 'true'
    AllowedValues: ['true', 'false']

  TimeDifferenceMs:
    Type: Number
    Description: >
      Client-to-server time offset in milliseconds.
      NZ (NZDT) = 46800000 (13 hours). Used for audio download URL construction
      and video time conversion.
    Default: 46800000

  LanguageOptions:
    Type: String
    Description: Comma-separated language codes for Transcribe auto-detection
    Default: en-NZ,en-AU,en-GB,en-US,zh-CN

  MaxSpeakers:
    Type: Number
    Description: Max speakers for Transcribe diarization (2-10)
    Default: 5
    MinValue: 2
    MaxValue: 10

  AlertEmail:
    Type: String
    Description: Email address for failure alerts (leave empty to skip)
    Default: ''

  ClaudeApiKey:
    Type: String
    Description: Anthropic Claude API key (sk-ant-xxx) for report generation
    NoEcho: true
    Default: ''

  DashScopeApiKey:
    Type: String
    Description: Alibaba Cloud DashScope API key (Phase 4d) for text-embedding-v4 embeddings
    NoEcho: true
    Default: ''

  LlmProvider:
    Type: String
    Description: LLM provider for all Claude call sites (anthropic|qwen)
    AllowedValues: [anthropic, qwen]
    Default: anthropic

  QwenBaseUrl:
    Type: String
    Description: DashScope OpenAI-compatible base URL for Qwen chat completions
    Default: https://dashscope-intl.aliyuncs.com/compatible-mode/v1

  QwenModelPlus:
    Type: String
    Description: Qwen model for structured-JSON tasks (report/meeting/extract/matcher)
    Default: qwen3.7-max

  QwenModelFast:
    Type: String
    Description: Qwen model for the latency-bound ask path
    Default: qwen3.6-flash

  AsrProvider:
    Type: String
    Description: Speech-to-text provider (transcribe|elevenlabs)
    AllowedValues: [transcribe, elevenlabs]
    Default: transcribe

  ElevenLabsApiKey:
    Type: String
    Description: ElevenLabs xi-api-key for scribe_v2 STT
    NoEcho: true
    Default: ''

  ElevenLabsSttModel:
    Type: String
    Description: ElevenLabs STT model id
    Default: scribe_v2

  ElevenLabsLanguage:
    Type: String
    Description: ISO 639-3 language to pin (empty = auto-detect)
    Default: ''

  ScheduleExpression:
    Type: String
    Description: Download schedule (Cron in UTC)
    Default: cron(0 7 * * ? *)  # UTC 07:00 = NZDT 20:00

  SiteName:
    Type: String
    Description: Default site name (fallback when not resolved from user_mapping)
    Default: 'SB1108 Ellesmere College'

  # --- Lambda Layer ARNs (created outside this stack) ---
  VadLayerArn:
    Type: String
    Description: >
      ARN of the VAD Lambda Layer (ffmpeg + onnxruntime + silero model + numpy + soundfile).
      Leave empty to skip VAD function deployment.
    Default: ''

  DocxLayerArn:
    Type: String
    Description: >
      ARN of python-docx Lambda Layer.
      Leave empty — report/meeting Lambdas will still deploy but skip Word generation.
    Default: ''

  # --- DynamoDB table names (existing, created outside this stack) ---
  ItemsTableName:
    Type: String
    Description: Existing DynamoDB table for items
    Default: fieldsight-items

  ReportsTableName:
    Type: String
    Description: Existing DynamoDB table for reports
    Default: fieldsight-reports

  AuditTableName:
    Type: String
    Description: Existing DynamoDB table for audit log
    Default: fieldsight-audit

  UsersTableName:
    Type: String
    Description: Existing DynamoDB table for user profiles (API auth)
    Default: fieldsight-users

  TranscriptTableName:
    Type: String
    Description: Existing DynamoDB table for transcript ledger
    Default: fieldsight-transcripts

  CustomVocabularyName:
    Type: String
    Description: >
      AWS Transcribe Custom Vocabulary name for NZ construction terms.
      Leave empty to skip. Create first via:
        aws transcribe create-vocabulary --vocabulary-name fieldsight-construction-nz
          --language-code en-NZ --vocabulary-file-uri s3://bucket/config/custom_vocabulary_construction_nz.txt
    Default: ''

  # --- Fargate parameters ---
  FargateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnet(s) for Fargate tasks (must have internet access via IGW).
      VPC Console -> Subnets -> pick 1-2 subnets from your default VPC.

  FargateVpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for Fargate security group (usually your default VPC)

  # --- Phase 2B: Aurora DB (fieldsight-db-test) wiring ---
  DbStackName:
    Type: String
    Description: >
      Name of the fieldsight-db-* stack (infra/db-template.yaml) to import
      ClusterEndpoint/SecretArn/LambdaSG exports from. Leave empty (default)
      to skip MigrateFunction entirely — prod/default deploys are unaffected.
    Default: ''

  DbSecretArn:
    Type: String
    Description: >
      Full ARN of the DB cluster's RDS-managed master secret. Passed as a
      plain parameter (deploy.yml reads the db stack's SecretArn export)
      because secretsmanager dynamic references compose with Parameters but
      not with Fn::ImportValue. Only used when HasDb.
    Default: ''

  DbSubnetIds:
    Type: CommaDelimitedList
    Description: >
      Subnet ids for MigrateFunction's VpcConfig (same subnets as the DB
      stack). CommaDelimitedList (not List<AWS::EC2::Subnet::Id>) so an
      empty default is valid when DbStackName is unset.
    Default: ''

  OrgUserPoolId:
    Type: String
    Description: >
      Existing Cognito user pool id that real app users log in with (the
      prod pool). When set together with DbStackName, deploys the org API
      and adds this pool to the FieldSightApi authorizer so the UI's raw
      idToken is accepted on /api/org/*. Leave empty to skip (prod/default
      deploys are unaffected).
    Default: ''

  MultiTenantResolution:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      When true, ingest/item-writer resolve the owning company per user folder
      via the identity directory (users.folder_name, globally unique). When
      false, all pipeline writes are pinned to COMPANY_NAME's company — the
      TEST stack keeps false so develop-code runs can never write customer rows.

  AuthorityFlip:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      When true, nightly report ingest defers to a day's extraction topics
      instead of overwriting them (authority-flip spec §6) -- only when
      extraction topics already exist for that (user_folder, date); a day
      with none still falls back to writing report topics as before. False
      (default) is the pre-flip legacy behavior, unchanged in every path.

  GradedRoles:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      When true, org-api read paths route through visible_scope for graded
      visibility (regional_manager/platform_admin, per-site membership
      authority, the /live-items per-user filter -- Phase 3 graded-roles
      spec §3). False (default) is the pre-Phase-3 binary resolve_scope
      behavior, unchanged in every path, mirroring AuthorityFlip's rollout.

  ManageDataBucketPolicy:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Whether this stack CREATES/owns the DataBucketName bucket policy. TEST
      owns its own test bucket's policy (true). PROD points at the shared LAKE,
      which already has a hand-managed policy (the 2 Transcribe statements) —
      CFN's AWS::S3::BucketPolicy CREATE fails ("already exists") when adopting
      an unmanaged policy, so PROD sets this false and relies on the lake's
      existing policy.

  EnableSiteVoice:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      When true (and HasOrgApi), deploys the Site Voice WebSocket API + its
      Lambdas. Default false; test sets true (deploy.yml), prod is dark-launched
      false until the app is device-accepted (repo var PROD_ENABLE_SITE_VOICE,
      deploy-prod.yml) — mirrors PROD_ENABLE_SCHEDULES / PROD_AUTHORITY_FLIP.

# ============================================================
# Conditions
# ============================================================
Mappings:
  StageConfig:
    prod:
      Prefix: fieldsight-prod
      Domain: fieldsight-prod       # hosted-UI domain (unused; SRP auth). Distinct from test to avoid the Trap-B collision.
    test:
      Prefix: fieldsight-test
      Domain: fieldsight            # KEEP test's EXISTING domain (fieldsight-<acct>) — changing it forces a
                                    # Cognito UserPoolDomain replacement, which fails (one domain per pool, InvalidRequest).

Conditions:
  ShouldEnableSchedules: !Equals [!Ref EnableSchedules, 'true']
  ShouldEnableTranscribe: !Equals [!Ref EnableTranscribe, 'true']
  ShouldManageBucketPolicy: !And [!Condition ShouldEnableTranscribe, !Equals [!Ref ManageDataBucketPolicy, 'true']]
  ShouldCreateAlerts: !Not [!Equals [!Ref AlertEmail, '']]
  HasVadLayer: !Not [!Equals [!Ref VadLayerArn, '']]
  HasDocxLayer: !Not [!Equals [!Ref DocxLayerArn, '']]
  HasDb: !Not [!Equals [!Ref DbStackName, '']]
  HasOrgPool: !Not [!Equals [!Ref OrgUserPoolId, '']]
  HasOrgApi: !And [!Condition HasDb, !Condition HasOrgPool]
  HasSiteVoice: !And [!Condition HasOrgApi, !Equals [!Ref EnableSiteVoice, 'true']]

# ============================================================
# Global Settings
# ============================================================
Globals:
  Function:
    Runtime: python3.11
    Architectures:
      - x86_64
    Timeout: 300
    MemorySize: 256

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # S3 Bucket Policy (bucket itself is managed outside this stack)
  # ----------------------------------------------------------
  StorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    # prod stack's DataBucketName is the LAKE — never strip its hand-managed policy.
    # Both policies required (cfn-lint W3011): Retain on delete AND on replace.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Condition: ShouldManageBucketPolicy
    Properties:
      Bucket: !Ref DataBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowTranscribeRead
            Effect: Allow
            Principal:
              Service: transcribe.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${DataBucketName}/*
          - Sid: AllowTranscribeWrite
            Effect: Allow
            Principal:
              Service: transcribe.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub arn:aws:s3:::${DataBucketName}/transcripts/*

  # ----------------------------------------------------------
  # Lambda 1: Orchestrator v2 (Web Scraping)
  # ----------------------------------------------------------
  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-orchestrator", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_orchestrator.lambda_handler
      Timeout: 900  # 15 minutes
      MemorySize: 256
      Environment:
        Variables:
          REALPTT_ACCOUNT: !Ref RealPTTAccount
          REALPTT_PASSWORD: !Ref RealPTTPassword
          S3_BUCKET: !Ref DataBucketName
          DOWNLOADER_FUNCTION: !Ref DownloaderFunction
          START_DAYS_AGO: !Ref StartDaysAgo
          DOWNLOAD_AUDIO: !Ref DownloadAudio
          DOWNLOAD_VIDEO: !Ref DownloadVideo
          DOWNLOAD_FILES: !Ref DownloadFiles
          TIME_DIFFERENCE_MS: !Ref TimeDifferenceMs
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - LambdaInvokePolicy:
            FunctionName: !Ref DownloaderFunction
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:HeadObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/*
            - Sid: DownloadClaimLock
              Effect: Allow
              Action:
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/download_claims/*
      Events:
        NightlyEvent:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Description: Daily sync trigger (8 PM NZDT)
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]
        SweepEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0/15 17-23,0-7 * * ? *)
            Description: 15-min working-hours sweep NZ ~06:00-19:00 across DST
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]

  # ----------------------------------------------------------
  # Lambda 2: Downloader (small/medium files)
  # ----------------------------------------------------------
  DownloaderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-downloader", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_downloader.lambda_handler
      Timeout: 900  # 15 minutes
      MemorySize: 512
      EphemeralStorage:
        Size: 1024
      Policies:
        - S3WritePolicy:
            BucketName: !Ref DataBucketName
        - Version: '2012-10-17'
          Statement:
            - Sid: DownloadClaimRelease
              Effect: Allow
              Action: s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/download_claims/*

  # ----------------------------------------------------------
  # Lambda 3: Transcribe Trigger
  # NOTE: S3 event trigger must be configured manually since
  #       the bucket is managed outside this stack.
  #       aws s3api put-bucket-notification-configuration ...
  # ----------------------------------------------------------
  TranscribeFunction:
    Type: AWS::Serverless::Function
    Condition: ShouldEnableTranscribe
    Properties:
      FunctionName: !Sub ["${P}-transcribe", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_transcribe.lambda_handler
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          LANGUAGE_OPTIONS: !Ref LanguageOptions
          OUTPUT_PREFIX: transcripts/
          MAX_SPEAKERS: !Ref MaxSpeakers
          TRANSCRIPT_TABLE: !Ref TranscriptTableName
          VOCABULARY_NAME: !Ref CustomVocabularyName
          ASR_PROVIDER: !Ref AsrProvider
          ELEVENLABS_API_KEY: !Ref ElevenLabsApiKey
          ELEVENLABS_STT_MODEL: !Ref ElevenLabsSttModel
          ELEVENLABS_LANGUAGE: !Ref ElevenLabsLanguage
          KEYTERMS_PATH: config/custom_vocabulary_construction_nz.txt
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - S3WritePolicy:
            BucketName: !Ref DataBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptTableName
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: '*'

  # ----------------------------------------------------------
  # Lambda 2.5: VAD Speech Segmentation
  # NOTE: Requires sitesync-vad-layer (ffmpeg + onnxruntime + silero).
  #       S3 event trigger must be configured manually since
  #       the bucket is managed outside this stack.
  #       Trigger on: users/*/audio/*.wav AND users/*/video/*.mp4
  # ----------------------------------------------------------
  VadFunction:
    Type: AWS::Serverless::Function
    Condition: HasVadLayer
    Properties:
      FunctionName: !Sub ["${P}-vad", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_vad.lambda_handler
      Timeout: 900
      MemorySize: 3008   # parity with the hand-tuned legacy fieldsight-vad (BUG-04: large-audio OOM headroom)
      Runtime: python3.12  # fieldsight-vad-layer is built for cp312 (BUG-24 class) — do not fall back to the py3.11 global
      EphemeralStorage:
        Size: 2048
      Layers:
        - !Ref VadLayerArn
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName
          OUTPUT_PREFIX: audio_segments/
          MIN_SPEECH_DURATION: '1.0'
          MIN_SILENCE_DURATION: '3.0'
          MERGE_GAP: '2.0'
          VAD_THRESHOLD: '0.5'
          SAMPLE_RATE: '16000'
          SKIP_EXISTING: 'true'
          GENERATE_PREVIEW: 'true'
          WEB_VIDEO_PREFIX: web_video/
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucketName

  # ----------------------------------------------------------
  # Lambda 5: Report Generator
  # ----------------------------------------------------------
  ReportGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-report-generator", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_report_generator.lambda_handler
      Timeout: 300
      MemorySize: 512
      Runtime: python3.12  # python-docx-layer is built for cp312 (BUG-24) — on 3.11 Word generation silently disables
      Layers: !If
        - HasDocxLayer
        - - !Ref DocxLayerArn
        - !Ref AWS::NoValue
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName
          ANTHROPIC_API_KEY: !Ref ClaudeApiKey
          CLAUDE_MODEL: claude-sonnet-4-6
          LLM_PROVIDER: !Ref LlmProvider
          QWEN_API_KEY: !Ref DashScopeApiKey
          QWEN_BASE_URL: !Ref QwenBaseUrl
          QWEN_MODEL: !Ref QwenModelPlus
          QWEN_ENABLE_THINKING: 'true'
          LLM_HTTP_TIMEOUT: '180'
          REPORT_PREFIX: reports/
          SITE_NAME: !Ref SiteName
          ITEMS_TABLE: !Ref ItemsTableName
          REPORTS_TABLE: !Ref ReportsTableName
          AUDIT_TABLE: !Ref AuditTableName
          ENABLE_DYNAMODB: 'true'
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - S3WritePolicy:
            BucketName: !Ref DataBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTableName
      Events:
        DailyReportSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 16 * * ? *)
            Description: Daily report generation (5 AM NZDT)
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]
            Input: '{"report_type": "daily"}'
        WeeklyReportSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 5 ? * FRI *)
            Description: Weekly report generation (Friday 6 PM NZDT)
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]
            Input: '{"report_type": "weekly"}'
        MonthlyReportSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 17 L * ? *)
            Description: Monthly report generation (last day of month)
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]
            Input: '{"report_type": "monthly"}'

  # ----------------------------------------------------------
  # Lambda 3b: Transcribe Callback (EventBridge → DynamoDB)
  # ----------------------------------------------------------
  TranscribeCallbackFunction:
    Type: AWS::Serverless::Function
    Condition: ShouldEnableTranscribe
    Properties:
      FunctionName: !Sub ["${P}-transcribe-callback", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_transcribe_callback.lambda_handler
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          TRANSCRIPT_TABLE: !Ref TranscriptTableName
          MAX_ATTEMPTS: '3'
          S3_BUCKET: !Ref DataBucketName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptTableName
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - transcribe:GetTranscriptionJob
              Resource: '*'
      Events:
        TranscribeComplete:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.transcribe
              detail-type:
                - Transcribe Job State Change
              detail:
                TranscriptionJobStatus:
                  - COMPLETED
                  - FAILED

  # ----------------------------------------------------------
  # Lambda 6: Meeting Minutes Generator
  # ----------------------------------------------------------
  MeetingMinutesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-meeting-minutes", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_meeting_minutes.lambda_handler
      Timeout: 300
      MemorySize: 512
      Runtime: python3.12  # python-docx-layer is built for cp312 (BUG-24) — on 3.11 Word generation silently disables
      Layers: !If
        - HasDocxLayer
        - - !Ref DocxLayerArn
        - !Ref AWS::NoValue
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName
          ANTHROPIC_API_KEY: !Ref ClaudeApiKey
          CLAUDE_MODEL: claude-sonnet-4-6
          LLM_PROVIDER: !Ref LlmProvider
          QWEN_API_KEY: !Ref DashScopeApiKey
          QWEN_BASE_URL: !Ref QwenBaseUrl
          QWEN_MODEL: !Ref QwenModelPlus
          QWEN_ENABLE_THINKING: 'true'
          LLM_HTTP_TIMEOUT: '180'
          MINUTES_PREFIX: meeting_minutes/
          REPORT_PREFIX: reports/
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - S3WritePolicy:
            BucketName: !Ref DataBucketName

  # ----------------------------------------------------------
  # Lambda 8: Ask Agent (Report Q&A)
  # Phase 5: RAG mode -- embeds the question (DashScope, public
  # internet, non-VPC) then invokes RagSearchFunction (in-VPC) for
  # ACL-scoped chunks, and synthesizes a grounded answer + citations
  # via claude_utils (CLAUDE_MODEL). Legacy S3-file HAIKU_MODEL path
  # is retained as fallback when caller_sub is absent. RAG_SEARCH_FUNCTION
  # references RagSearchFunction (Condition HasDb) but this function
  # itself is unconditional -- see the W1001 note in the top-of-file
  # Metadata block for why that cross-condition Ref is safe in practice.
  # ----------------------------------------------------------
  AskAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-ask-agent", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_ask_agent.lambda_handler
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName
          ANTHROPIC_API_KEY: !Ref ClaudeApiKey
          HAIKU_MODEL: claude-haiku-4-5-20251001
          REPORT_PREFIX: reports/
          RAG_SEARCH_FUNCTION: !Ref RagSearchFunction
          DASHSCOPE_API_KEY: !Ref DashScopeApiKey
          DASHSCOPE_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
          DASHSCOPE_EMBED_MODEL: text-embedding-v4
          DASHSCOPE_EMBED_DIM: '1024'
          # SP-Ask: async audit hop (in-VPC). Same cross-condition Ref shape as
          # RAG_SEARCH_FUNCTION above (VoiceAuditFunction is HasDb, this fn is
          # unconditional) — safe in practice on the test stack; see the W1001
          # note in the top-of-file Metadata block.
          VOICE_AUDIT_FUNCTION: !Ref VoiceAuditFunction
          # I2: haiku, not sonnet. The user-facing ask round-trip is capped by
          # APIGW's hard 29s integration timeout on ApiFunction (Timeout: 30
          # above) -- and RAG synthesis adds two extra hops (embed call +
          # rag-search invoke) on top of the Claude call itself. A 2048-token
          # sonnet completion risks blowing that budget; haiku is fast and
          # matches the legacy S3 path's HAIKU_MODEL.
          CLAUDE_MODEL: claude-haiku-4-5-20251001
          LLM_PROVIDER: !Ref LlmProvider
          QWEN_API_KEY: !Ref DashScopeApiKey
          QWEN_BASE_URL: !Ref QwenBaseUrl
          QWEN_MODEL: !Ref QwenModelFast
          # DASHSCOPE_TTS_* below default inside dashscope_utils.py (model
          # qwen3-tts-flash-realtime, voice Cherry, intl WS url) — no env
          # override needed here; DashScopeLayer (below) provides the SDK.
      Layers:
        - !Ref DashScopeLayer
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - LambdaInvokePolicy:
            FunctionName: !Ref RagSearchFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref VoiceAuditFunction

  # ----------------------------------------------------------
  # Lambda Layer: dashscope SDK (SP-Ask TTS)
  # AskAgentFunction's tts() needs the Qwen-TTS-Realtime WebSocket client
  # (dashscope.audio.qwen_tts_realtime), not available via a plain HTTP call
  # like embed()/stt() -- hence a dedicated layer, same build pattern as
  # PsycopgLayer just below. Condition: HasDb mirrors PsycopgLayer exactly;
  # AskAgentFunction's !Ref to it is covered by the same W1001 suppression
  # (top-of-file Metadata) as its RagSearchFunction/VoiceAuditFunction refs --
  # inert in practice since both real deploy targets always set DbStackName.
  # ----------------------------------------------------------
  DashScopeLayer:
    Type: AWS::Serverless::LayerVersion
    Condition: HasDb
    Properties:
      LayerName: !Sub ["${P}-dashscope-layer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      Description: dashscope SDK (Qwen-TTS-Realtime WebSocket client) for AskAgentFunction's tts()
      ContentUri: infra/dashscope-layer/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # ----------------------------------------------------------
  # Lambda Layer: PyJWT[crypto] for the Site Voice WS authorizer.
  # Same sam-build pattern as PsycopgLayer/DashScopeLayer. Gated HasSiteVoice.
  # ----------------------------------------------------------
  JwtLayer:
    Type: AWS::Serverless::LayerVersion
    Condition: HasSiteVoice
    Properties:
      LayerName: !Sub ["${P}-jwt-layer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      Description: PyJWT[crypto] (JWKS RS256) for the Site Voice WebSocket authorizer
      ContentUri: infra/jwt-layer/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # ----------------------------------------------------------
  # Lambda Layer: psycopg[binary] + pgvector (Phase 2B)
  # `sam build` runs pip on the CI runner (Metadata BuildMethod) to produce
  # manylinux wheels compatible with the Lambda python3.11 runtime.
  # ----------------------------------------------------------
  PsycopgLayer:
    Type: AWS::Serverless::LayerVersion
    Condition: HasDb
    Properties:
      LayerName: !Sub ["${P}-psycopg-layer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      Description: psycopg[binary] + pgvector for MigrateFunction (and future in-VPC DB Lambdas)
      ContentUri: infra/psycopg-layer/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # ----------------------------------------------------------
  # Lambda 9: Migrate (apply pending SQL migrations to Aurora)
  # Manual invoke only (no Events). Gated by HasDb so prod/default
  # deploys (DbStackName unset) are completely unaffected.
  # ----------------------------------------------------------
  MigrateFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-migrate", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_migrate.lambda_handler
      Timeout: 120
      MemorySize: 512
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          # libpq-standard env vars: psycopg.connect("") picks these up.
          # PGPASSWORD is resolved AT DEPLOY TIME via a dynamic reference —
          # a VPC Lambda with no NAT/endpoints cannot call Secrets Manager
          # at runtime (first attempt hung to timeout, 2026-07-04).
          # DbSecretArn is a plain Parameter because {{resolve:...}} only
          # composes with parameters, not ImportValue (deploy.yml fetches
          # the export and passes it through).
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # ----------------------------------------------------------
  # Lambda 10: Org API (Phase 3) — real write backend for
  # projects/members/roles/profile/images. In-VPC (psycopg → Aurora).
  # Gated by HasOrgApi (DbStackName + OrgUserPoolId both set).
  # ----------------------------------------------------------
  OrgApiFunction:
    Type: AWS::Serverless::Function
    Condition: HasOrgApi
    Properties:
      FunctionName: !Sub ["${P}-org-api", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_org_api.lambda_handler
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          # Deploy-time credential injection — see MigrateFunction notes.
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
          COGNITO_USER_POOL_ID: !Ref OrgUserPoolId
          S3_BUCKET: !Ref DataBucketName
          ORG_ASSETS_PREFIX: org-assets/
          # authority-flip Task 4 — /timeline reads the lake bucket's
          # reports/ prefix (a DIFFERENT bucket than DataBucketName above;
          # mirrors MatcherFunction's DataBucketName/IngestBucketName split).
          LAKE_BUCKET: !Ref IngestBucketName
          # Site voice: dedicated off-the-record prefix (matches no S3 trigger).
          VOICE_PREFIX: voice/
          # Phase 3 Task 4 — graded-roles cutover flag, wired the same way as
          # AUTHORITY_FLIP (IngestFunction, above): Parameter default 'false',
          # driven per-environment by a repo variable in the deploy workflows.
          GRADED_ROLES: !Ref GradedRoles
      Policies:
        - VPCAccessPolicy: {}
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminGetUser
              Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${OrgUserPoolId}
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/org-assets/*
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/programmes/*
            - Effect: Allow
              # Recordings upload: the org API issues presigned PUTs into
              # users/{name}/{video|audio|pictures}/{date}/ for the mobile app
              # (GrandTime). Presigning is offline, but the role must be able to
              # PutObject there for the signed URL to be valid.
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/users/*
            - Effect: Allow
              # Site voice clips: presigned PUT/GET under a DEDICATED voice/
              # prefix (never users/ or recordings) — the data-isolation
              # invariant. Same bucket as recordings (DataBucketName); voice/
              # matches no wire-s3-events.sh trigger, so it never ingests.
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/voice/*
            - Effect: Allow
              # GET /api/org/transcripts (Aurora-identity /transcripts fix) —
              # read-only, same transcripts/* objects the legacy fieldsight-api
              # role and ExtractSessionFunction already read (different bucket
              # for the latter — see ExtractSessionFunction's IngestBucketName
              # grant — but same DataBucketName prefix the Transcribe service
              # itself writes into, see StorageBucketPolicy's AllowTranscribeWrite
              # above).
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/transcripts/*
            - Effect: Allow
              # Without ListBucket, S3 returns AccessDenied/403 (not
              # NoSuchKey/404) for a missing object under a prefix this
              # role can't list — read_programme would then re-raise a
              # fake 500 on every site that has never had a programme
              # uploaded (Fable review High #1). Scoped to programmes/*
              # and transcripts/* only, mirrors ExtractSessionFunction's
              # transcripts/* grant (in the other bucket).
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${DataBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - programmes/*
                    - transcripts/*
            - Effect: Allow
              # authority-flip Task 4 — /timeline reads daily_report.json
              # (and summary_report.json) verbatim from the lake bucket.
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/reports/*
            - Effect: Allow
              # Without ListBucket, S3 returns AccessDenied/403 (not
              # NoSuchKey/404) for a missing object under a prefix this role
              # can't list — the shim's _get_lake_json would then re-raise a
              # fake 500 for every (user, date) with no report yet, and
              # admin_disambiguation's folder listing would itself fail
              # outright (same reasoning as this function's own programmes/*
              # grant above, and MatcherFunction's programmes/* grant).
              # Scoped to reports/* only, in the IngestBucketName bucket
              # (the lake), not DataBucketName (org-assets/programmes).
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${IngestBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - reports/*
            - Effect: Allow
              # Task 20 (content correction reindex chain): after a content
              # edit commits, org-api (in-VPC) writes the per-topic reindex
              # REQUEST artifact to the lake bucket's reindex_requests/
              # prefix — it never calls DashScope itself (BUG-36). The
              # non-VPC EmbedReportFunction picks this up via a manually
              # wired S3 trigger (scripts/wire-s3-events.sh, BUG-33) and
              # writes the VECTORS artifact back into the same prefix.
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/reindex_requests/*
      Events:
        OrgProxy:
          Type: Api
          Properties:
            RestApiId: !Ref FieldSightApi
            Path: /api/org/{proxy+}
            Method: ANY

  # ----------------------------------------------------------
  # Lambda 11: Org Seed (Phase 3) — one-shot idempotent backfill of
  # company/users/sites/memberships from Cognito + config/user_mapping.json.
  # Manual invoke only (no Events).
  # ----------------------------------------------------------
  OrgSeedFunction:
    Type: AWS::Serverless::Function
    Condition: HasOrgApi
    Properties:
      FunctionName: !Sub ["${P}-org-seed", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_org_seed.lambda_handler
      Timeout: 120
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
          COGNITO_USER_POOL_ID: !Ref OrgUserPoolId
          S3_BUCKET: !Ref DataBucketName
          CONFIG_KEY: config/user_mapping.json
      Policies:
        - VPCAccessPolicy: {}
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: cognito-idp:ListUsers
              Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${OrgUserPoolId}
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::${DataBucketName}/config/user_mapping.json

  # ----------------------------------------------------------
  # Lambda 13: Extract Session (Phase 4b) — S3 event on transcripts/,
  # collects a session's segments, calls Claude directly (mirrors
  # ReportGenerator's ANTHROPIC_API_KEY/CLAUDE_MODEL env pattern), and
  # writes the session-extraction JSON to extractions/. NOT in VPC (no
  # DB access needed, so no Condition -- deploys even without HasDb).
  # NO Events: S3 wired manually per BUG-33 — see
  # scripts/wire-s3-events.sh (fs-extract-transcripts, triggers on
  # transcripts/*.json).
  # ----------------------------------------------------------
  ExtractSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-extract-session", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_extract_session.lambda_handler
      Timeout: 180
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET: !Ref IngestBucketName
          CONFIG_KEY: config/user_mapping.json
          ANTHROPIC_API_KEY: !Ref ClaudeApiKey
          CLAUDE_MODEL: claude-sonnet-4-6
          LLM_PROVIDER: !Ref LlmProvider
          QWEN_API_KEY: !Ref DashScopeApiKey
          QWEN_BASE_URL: !Ref QwenBaseUrl
          QWEN_MODEL: !Ref QwenModelPlus
          QWEN_ENABLE_THINKING: 'true'
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource:
                - !Sub arn:aws:s3:::${IngestBucketName}/transcripts/*
                - !Sub arn:aws:s3:::${IngestBucketName}/config/user_mapping.json
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/extractions/*
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${IngestBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - transcripts/*

  # ----------------------------------------------------------
  # Lambda 12: Ingest (Phase 4a) — reads reports/ + transcripts/,
  # looks up chunk embeddings by sha256(chunk_text) from the
  # embeddings/{date}/{user}/vectors.json sidecar (written by
  # EmbedReportFunction), writes to pgvector. In-VPC (psycopg →
  # Aurora). Bedrock retired (Phase 4d) — embedding now happens
  # non-VPC in EmbedReportFunction; this function does zero outbound
  # HTTP, only S3 reads + Aurora writes. Gated by HasDb.
  # NO Events: S3 wired manually per BUG-33 — see
  # scripts/wire-s3-events.sh (triggers on embeddings/*vectors.json).
  # ----------------------------------------------------------
  IngestFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-ingest", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_ingest.lambda_handler
      Timeout: 900   # backfill sweeps the whole lake in one invoke (Fable minor 5)
      MemorySize: 512
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          # Deploy-time credential injection — see MigrateFunction notes.
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
          S3_BUCKET: !Ref IngestBucketName
          CONFIG_KEY: config/user_mapping.json
          MULTI_TENANT_RESOLUTION: !Ref MultiTenantResolution
          AUTHORITY_FLIP: !Ref AuthorityFlip
      Policies:
        - VPCAccessPolicy: {}
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource:
                - !Sub arn:aws:s3:::${IngestBucketName}/reports/*
                - !Sub arn:aws:s3:::${IngestBucketName}/transcripts/*
                - !Sub arn:aws:s3:::${IngestBucketName}/embeddings/*
                - !Sub arn:aws:s3:::${IngestBucketName}/config/user_mapping.json
            - Effect: Allow
              # Task 4: after committing a report's topics, ingest emits a
              # match_requests/ artifact (match_request.emit) for the non-VPC
              # MatcherFunction's S3 trigger — mirrors EmbedReportFunction's
              # embeddings/* PutObject grant below.
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/match_requests/*
            - Effect: Allow
              # Task 20 (content correction reindex chain): apply_reindex_vectors
              # reads the VECTORS artifact the non-VPC EmbedReportFunction wrote
              # under reindex_vectors/ (separate prefix from the request — S3
              # forbids overlapping-suffix rules on a shared prefix; S3-event
              # triggered, BUG-33 wiring in scripts/wire-s3-events.sh) before
              # replacing the topic's chunks in Aurora (delete_chunks_for_topic
              # + insert_chunk).
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/reindex_vectors/*
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${IngestBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - reports/*
                    - transcripts/*

  # ----------------------------------------------------------
  # Lambda 15: Embed Report (Phase 4d) — S3 event on reports/,
  # chunks the report + its transcripts and calls DashScope
  # (text-embedding-v4, public internet) directly, writing the
  # {sha256(chunk_text): vector} sidecar to embeddings/. NOT in
  # VPC (DashScope needs public internet, unreachable from inside
  # the VPC — mirrors ReportGeneratorFunction/ExtractSessionFunction's
  # non-VPC shape). Layers/Condition: HasDb ARE still required even
  # though this function itself never touches Aurora, because
  # lambda_embed_report imports lambda_ingest (shared chunking/hash
  # helpers), which transitively imports psycopg at module load —
  # without PsycopgLayer this is a cold-start ImportError; PsycopgLayer
  # only exists when HasDb, so this function must share that Condition.
  # NO Events: S3 wired manually per BUG-33 — see
  # scripts/wire-s3-events.sh (fs-embed-report, triggers on
  # reports/*daily_report.json).
  # ----------------------------------------------------------
  EmbedReportFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-embed-report", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_embed_report.lambda_handler
      Timeout: 300
      MemorySize: 512
      Layers:
        - !Ref PsycopgLayer
      Environment:
        Variables:
          S3_BUCKET: !Ref IngestBucketName
          CONFIG_KEY: config/user_mapping.json
          DASHSCOPE_API_KEY: !Ref DashScopeApiKey
          DASHSCOPE_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
          DASHSCOPE_EMBED_MODEL: text-embedding-v4
          DASHSCOPE_EMBED_DIM: '1024'
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource:
                - !Sub arn:aws:s3:::${IngestBucketName}/reports/*
                - !Sub arn:aws:s3:::${IngestBucketName}/transcripts/*
                - !Sub arn:aws:s3:::${IngestBucketName}/config/user_mapping.json
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/embeddings/*
            - Effect: Allow
              # Task 20 (content correction reindex chain): reads the REQUEST
              # artifact org-api enqueued under reindex_requests/ and writes the
              # VECTORS result to a SEPARATE prefix reindex_vectors/ for the
              # in-VPC IngestFunction to apply. Distinct prefixes — S3 forbids
              # overlapping-suffix rules on a shared prefix, and the vectors
              # output never re-triggers embed (no BUG-13 loop).
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/reindex_requests/*
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/reindex_vectors/*
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${IngestBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - transcripts/*

  # ----------------------------------------------------------
  # Lambda 14: Item Writer (Phase 4b) — S3 event on extractions/,
  # writes a session-extraction JSON to Aurora topics (reuses
  # lambda_ingest's identity bridge + topic-child mapping via import,
  # never copied). In-VPC (psycopg -> Aurora), mirrors IngestFunction's
  # Layers/VpcConfig/PG env verbatim. Gated by HasDb.
  # NO Events: S3 wired manually per BUG-33 — see
  # scripts/wire-s3-events.sh (fs-write-extractions, triggers on
  # extractions/*.json).
  # ----------------------------------------------------------
  ItemWriterFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-item-writer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_item_writer.lambda_handler
      Timeout: 120
      MemorySize: 512
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          # Deploy-time credential injection — see MigrateFunction notes.
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
          S3_BUCKET: !Ref IngestBucketName
          CONFIG_KEY: config/user_mapping.json
          MULTI_TENANT_RESOLUTION: !Ref MultiTenantResolution
      Policies:
        - VPCAccessPolicy: {}
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource:
                - !Sub arn:aws:s3:::${IngestBucketName}/extractions/*
                - !Sub arn:aws:s3:::${IngestBucketName}/config/user_mapping.json
            - Effect: Allow
              # Task 4: after committing an extraction's topics, item-writer
              # emits a match_requests/ artifact (match_request.emit) for the
              # non-VPC MatcherFunction's S3 trigger — mirrors
              # EmbedReportFunction's embeddings/* PutObject grant.
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${IngestBucketName}/match_requests/*
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${IngestBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - extractions/*
                    # Task 3 (authority-flip plan) -- list-only (no
                    # GetObject) so write_extraction_items can list
                    # users/{user_folder}/pictures/{date}/ to time-correlate
                    # photos onto extraction topics (topic_photos).
                    - users/*

  # ----------------------------------------------------------
  # Lambda 17: Suggestion Writer (Programme<->Item feedback, Task 2) —
  # in-VPC, inserts `pending` rows into programme_progress_suggestions
  # (migration 0008). Invoked directly (Lambda invoke, no S3 event) by the
  # non-VPC MatcherFunction (Task 3) with a batch of suggestions — the
  # matcher needs internet (DashScope/Claude) which in-VPC lambdas cannot
  # reach (BUG-36: only an S3 gateway endpoint), so the match is split into
  # this in-VPC write hop. Mirrors ItemWriterFunction's Layers/VpcConfig/PG
  # env verbatim. Gated by HasDb. NO Events (manual/invoke only, like
  # RagSearchFunction below).
  # ----------------------------------------------------------
  SuggestionWriterFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-suggestion-writer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_suggestion_writer.lambda_handler
      Timeout: 120
      MemorySize: 512
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          # Deploy-time credential injection — see MigrateFunction notes.
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # ----------------------------------------------------------
  # Lambda 18: Programme Matcher (Programme<->Item feedback, Task 3) —
  # S3 event on match_requests/ (wired by Task 4), reads the site's
  # programme.json, hard-gates + DashScope-embed-ranks + one Claude call
  # to pick at most one task per topic (fail-closed), then Lambda-invokes
  # SuggestionWriterFunction above. NOT in VPC (needs public internet for
  # DashScope/Claude; BUG-36 — an in-VPC lambda only has an S3 gateway
  # endpoint) — mirrors ExtractSessionFunction/EmbedReportFunction's
  # non-VPC shape (no VpcConfig). NO PsycopgLayer: unlike EmbedReportFunction
  # (which transitively imports lambda_ingest -> psycopg at module load),
  # this module only imports claude_utils/dashscope_utils/repositories.
  # programme, none of which touch psycopg — so no PsycopgLayer is needed
  # for import-time correctness. Condition: HasDb IS still required (unlike
  # ExtractSessionFunction, which is unconditional) because this function's
  # env/policy reference SuggestionWriterFunction, which only exists when
  # HasDb is true — an unconditional Ref here would be a second W1001-style
  # cross-condition reference with no existing lint suppression covering it.
  # NO Events: S3 wired manually per BUG-33 — Task 4 adds a
  # scripts/wire-s3-events.sh entry (fs-programme-match, match_requests/
  # prefix, .json suffix).
  # ----------------------------------------------------------
  MatcherFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-programme-matcher", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_programme_matcher.lambda_handler
      # 600s (bumped from 300 by the 2026-07-13 plan's Task 4): the impact
      # phase adds a SECOND `claude_utils.call_claude` per topic (each up to
      # claude_utils' 150s HTTP timeout), so a multi-topic artifact can now
      # need up to ~2x the sequential Claude time it used to. 300s left
      # headroom for one slow call per topic (Fable review IMPORTANT #4);
      # doubling that per-topic cost while keeping room for several topics
      # per invocation needs the doubled budget too.
      Timeout: 600
      MemorySize: 256
      Environment:
        Variables:
          # match_requests/ artifact (Task 4 emits it) lands in the lake
          # bucket that embed-report/extract-session/item-writer use.
          S3_BUCKET: !Ref IngestBucketName
          # programmes/{site_id}/programme.json is written by OrgApiFunction
          # to DataBucketName — a DIFFERENT bucket than the lake on the TEST
          # stack (org-api uses DataBucketName, lake fns use IngestBucketName)
          # — so read_programme must target DataBucketName explicitly.
          PROGRAMME_BUCKET: !Ref DataBucketName
          # Ref (not Sub/GetAtt) on a Lambda resource returns its physical
          # function name — same pattern as AskAgentFunction's
          # RAG_SEARCH_FUNCTION: !Ref RagSearchFunction.
          SUGGESTION_WRITER_FUNCTION: !Ref SuggestionWriterFunction
          SIM_MAX_DIST: '0.55'
          CONF_MIN: '0.70'
          TOP_K: '5'
          LEAD_DAYS: '7'
          LAG_DAYS: '14'
          # DashScope key — mirrors EmbedReportFunction's env block.
          DASHSCOPE_API_KEY: !Ref DashScopeApiKey
          DASHSCOPE_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
          DASHSCOPE_EMBED_MODEL: text-embedding-v4
          DASHSCOPE_EMBED_DIM: '1024'
          # Claude key — mirrors ExtractSessionFunction's env block.
          ANTHROPIC_API_KEY: !Ref ClaudeApiKey
          CLAUDE_MODEL: claude-sonnet-4-6
          LLM_PROVIDER: !Ref LlmProvider
          QWEN_API_KEY: !Ref DashScopeApiKey
          QWEN_BASE_URL: !Ref QwenBaseUrl
          QWEN_MODEL: !Ref QwenModelPlus
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SuggestionWriterFunction
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource:
                - !Sub arn:aws:s3:::${DataBucketName}/programmes/*
                - !Sub arn:aws:s3:::${IngestBucketName}/match_requests/*
            - Effect: Allow
              # Without ListBucket, S3 returns AccessDenied/403 (not
              # NoSuchKey/404) for a missing object under a prefix this
              # role can't list — read_programme would re-raise a fake 500
              # for any site that has never had a programme uploaded
              # (same reasoning as OrgApiFunction's programmes/* grant).
              # programmes/ and match_requests/ live in DIFFERENT buckets,
              # so ListBucket is granted per-bucket per-prefix.
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${DataBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - programmes/*
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${IngestBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - match_requests/*

  # ----------------------------------------------------------
  # Lambda 16: RAG Search (Phase 5) — in-VPC ACL-scoped semantic
  # search over pgvector chunks (search_chunks). Consumed only by
  # AskAgentFunction via Lambda invoke (query_embedding computed
  # non-VPC by ask-agent -- this function never calls DashScope/
  # Claude, so it needs no internet egress, only Aurora). Mirrors
  # OrgApiFunction's VpcConfig/PsycopgLayer/PG env verbatim. Gated
  # by HasDb (DbStackName set) -- same condition as PsycopgLayer/
  # IngestFunction/ItemWriterFunction. NO Events (manual/invoke only).
  # ----------------------------------------------------------
  RagSearchFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-rag-search", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_rag_search.lambda_handler
      Timeout: 30
      MemorySize: 512
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          # Deploy-time credential injection — see MigrateFunction notes.
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # ----------------------------------------------------------
  # Lambda: Voice Audit (SP-Ask) — in-VPC write of one voice_ask_log row.
  # Async-invoked (Event) by AskAgentFunction (non-VPC) after a voice ask;
  # AskAgent can't reach Aurora (BUG-36) so the audit is split into this hop.
  # Mirrors RagSearchFunction's VpcConfig/PsycopgLayer/PG env verbatim. Gated
  # by HasDb. NO Events (invoke only).
  # ----------------------------------------------------------
  VoiceAuditFunction:
    Type: AWS::Serverless::Function
    Condition: HasDb
    Properties:
      FunctionName: !Sub ["${P}-voice-audit", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_voice_audit.lambda_handler
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # ==========================================================
  # SITE VOICE (WebSocket) — Lambdas. WS API wiring is in the
  # ApiGatewayV2 block below. All gated by HasSiteVoice.
  # ==========================================================

  # In-VPC reaper: targeted delete (fanout GoneException) + scheduled sweep.
  VoiceReaperFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-voice-reaper", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_voice_reaper.lambda_handler
      Timeout: 60
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}
      Events:
        SweepEvent:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Description: Reap stale ws_connections + prune voice_messages > 30d
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]
            Input: '{"sweep": true}'

  # Non-VPC fanout: POST payload over @connections; GoneException -> reaper.
  VoiceFanoutFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-voice-fanout", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_voice_fanout.lambda_handler
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          VOICE_REAPER_FUNCTION: !Ref VoiceReaperFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref VoiceReaperFunction
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              # @connections management POST. Scoped to POST/@connections; the
              # concrete WS api id (VoiceWebSocketApi, below) is created in the
              # ApiGatewayV2 block — wildcard api keeps this fn's role
              # self-contained and is least-privilege on action+path.
              Action: execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/@connections/*

  # In-VPC $connect: resolve sub -> upsert ws_connections.
  WsConnectFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-ws-connect", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_ws_connect.lambda_handler
      Timeout: 15
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # In-VPC $disconnect: delete the connection row.
  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-ws-disconnect", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_ws_disconnect.lambda_handler
      Timeout: 15
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # In-VPC leaf: the Aurora work for sendVoice (ACL + insert voice_messages +
  # resolve recipients). A LEAF — no outbound AWS call (BUG-36 safe); the
  # non-VPC sendVoice orchestrator sync-invokes it.
  VoiceResolveFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-voice-resolve", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_voice_resolve.lambda_handler
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref PsycopgLayer
      VpcConfig:
        SubnetIds: !Ref DbSubnetIds
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${DbStackName}-LambdaSG"
      Environment:
        Variables:
          PGHOST: !ImportValue
            Fn::Sub: "${DbStackName}-ClusterEndpoint"
          PGDATABASE: !ImportValue
            Fn::Sub: "${DbStackName}-DbName"
          PGUSER: postgres
          PGPASSWORD: !Sub '{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}'
      Policies:
        - VPCAccessPolicy: {}

  # Non-VPC orchestrator: sync-invoke the in-VPC voice-resolve leaf (the Aurora
  # work), then async-invoke voice-fanout. NON-VPC so both lambda:Invoke calls
  # have egress — an in-VPC fn cannot reach the Lambda API (BUG-36).
  WsSendVoiceFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-send-voice", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_ws_send_voice.lambda_handler
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          VOICE_RESOLVE_FUNCTION: !Ref VoiceResolveFunction
          VOICE_FANOUT_FUNCTION: !Ref VoiceFanoutFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref VoiceResolveFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref VoiceFanoutFunction

  # Non-VPC REQUEST authorizer: verify Cognito idToken via JWKS (RS256).
  VoiceWsAuthorizerFunction:
    Type: AWS::Serverless::Function
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Sub ["${P}-voice-ws-authorizer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_ws_authorizer.lambda_handler
      Timeout: 10
      MemorySize: 256
      Layers:
        - !Ref JwtLayer
      Environment:
        Variables:
          # Trust the same pool(s) the REST CognitoAuthorizer trusts (the pool
          # the app logs into). Comma-separated to allow adding this stack's
          # own UserPool later; today just the org pool.
          WS_USER_POOL_IDS: !Ref OrgUserPoolId

  # ----------------------------------------------------------
  # Site Voice WebSocket API (raw ApiGatewayV2 — SAM has no WS type).
  # ----------------------------------------------------------
  VoiceWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Condition: HasSiteVoice
    Properties:
      Name: !Sub ["${P}-voice-ws", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  VoiceWsAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      Name: !Sub ["${P}-voice-ws-authorizer", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AuthorizerType: REQUEST
      IdentitySource:
        - route.request.header.Authorization
      AuthorizerUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${VoiceWsAuthorizerFunction.Arn}/invocations

  VoiceWsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations

  VoiceWsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations

  VoiceWsSendVoiceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsSendVoiceFunction.Arn}/invocations

  VoiceWsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref VoiceWsAuthorizer
      Target: !Sub integrations/${VoiceWsConnectIntegration}

  VoiceWsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${VoiceWsDisconnectIntegration}

  VoiceWsSendVoiceRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      RouteKey: sendVoice
      AuthorizationType: NONE
      Target: !Sub integrations/${VoiceWsSendVoiceIntegration}

  VoiceWsDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    Condition: HasSiteVoice
    DependsOn:
      - VoiceWsConnectRoute
      - VoiceWsDisconnectRoute
      - VoiceWsSendVoiceRoute
    Properties:
      ApiId: !Ref VoiceWebSocketApi

  VoiceWsStage:
    Type: AWS::ApiGatewayV2::Stage
    Condition: HasSiteVoice
    Properties:
      ApiId: !Ref VoiceWebSocketApi
      StageName: prod
      DeploymentId: !Ref VoiceWsDeployment

  VoiceWsAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Ref VoiceWsAuthorizerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VoiceWebSocketApi}/*

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VoiceWebSocketApi}/*

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VoiceWebSocketApi}/*

  WsSendVoicePermission:
    Type: AWS::Lambda::Permission
    Condition: HasSiteVoice
    Properties:
      FunctionName: !Ref WsSendVoiceFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VoiceWebSocketApi}/*

  # ==========================================================
  # COGNITO - User Authentication
  # ==========================================================

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ["${P}-users", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: false
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ["${P}-web-client", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - http://localhost:3000/callback
        - https://localhost/callback
      LogoutURLs:
        - http://localhost:3000/
        - https://localhost/
      AllowedOAuthFlows:
        - implicit
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ["${D}-${AWS::AccountId}", {D: !FindInMap [StageConfig, !Ref Stage, Domain]}]
      UserPoolId: !Ref UserPool

  # ==========================================================
  # API GATEWAY + API Lambda
  # ==========================================================

  FieldSightApi:
    Type: AWS::Serverless::Api
    Metadata:
      # W1028 (unreachable Fn::If branch) fires on SAM's OWN Swagger-merge
      # output: the unconditioned Api body conditionally splices the
      # HasOrgApi-gated OrgApiFunction path, nesting Fn::If in generated
      # boilerplate. Suppressed here (resource-level) so a real unreachable
      # Fn::If elsewhere in the template still lints.
      cfn-lint:
        config:
          ignore_checks:
            - W1028
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,PATCH,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            # Accepts idTokens from this stack's own pool AND (test stage)
            # the prod pool the UI logs into — /api/org/* is called by the
            # deployed UI with its prod-pool token. NB: this trusts prod
            # tokens on ALL /api/* routes of the TEST gateway; test-stage
            # data only, acceptable by design (2026-07-04).
            UserPoolArn:
              - !GetAtt UserPool.Arn
              - !If
                - HasOrgPool
                - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${OrgUserPoolId}
                - !Ref AWS::NoValue

  # ----------------------------------------------------------
  # Lambda 7: REST API Backend
  # ----------------------------------------------------------
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-api", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CodeUri: src/
      Handler: lambda_fieldsight_api.lambda_handler
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName
          REPORT_PREFIX: reports/
          ITEMS_TABLE: !Ref ItemsTableName
          REPORTS_TABLE: !Ref ReportsTableName
          AUDIT_TABLE: !Ref AuditTableName
          USERS_TABLE: !Ref UsersTableName
          REPORT_FUNCTION: !Ref ReportGeneratorFunction
          ASK_AGENT_FUNCTION: !Ref AskAgentFunction
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - S3WritePolicy:
            BucketName: !Ref DataBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ReportsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTableName
        - LambdaInvokePolicy:
            FunctionName: !Ref ReportGeneratorFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref AskAgentFunction
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref FieldSightApi
            Path: /api/health
            Method: GET
            Auth:
              Authorizer: NONE
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref FieldSightApi
            Path: /api/{proxy+}
            Method: ANY

  # ==========================================================
  # FARGATE - Large File Downloads (no time limit)
  # ==========================================================

  # ----------------------------------------------------------
  # ECS Cluster
  # ----------------------------------------------------------
  DownloaderCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ["${P}-downloader-cluster", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      CapacityProviders:
        - FARGATE_SPOT
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

  # ----------------------------------------------------------
  # Fargate Execution Role (pull image + write logs)
  # ----------------------------------------------------------
  FargateExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ["${P}-fargate-execution-${AWS::Region}", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ----------------------------------------------------------
  # Fargate Task Role (S3 access for the running container)
  # ----------------------------------------------------------
  FargateTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ["${P}-fargate-task-${AWS::Region}", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateMultipartUpload
                  - s3:UploadPart
                  - s3:CompleteMultipartUpload
                  - s3:AbortMultipartUpload
                Resource:
                  - !Sub arn:aws:s3:::${DataBucketName}
                  - !Sub arn:aws:s3:::${DataBucketName}/*

  # ----------------------------------------------------------
  # Security Group (outbound internet only)
  # ----------------------------------------------------------
  FargateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate downloader - outbound internet only
      VpcId: !Ref FargateVpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ----------------------------------------------------------
  # Fargate Task Definition
  # ----------------------------------------------------------
  FargateDownloaderTask:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ["${P}-fargate-downloader", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '256'       # 0.25 vCPU (cheapest)
      Memory: '512'    # 512 MB
      ExecutionRoleArn: !GetAtt FargateExecutionRole.Arn
      TaskRoleArn: !GetAtt FargateTaskRole.Arn
      ContainerDefinitions:
        - Name: downloader
          Image: python:3.11-slim
          Essential: true
          Environment:
            - Name: S3_BUCKET
              Value: !Ref DataBucketName
          Command:
            - sh
            - -c
            - |
              pip install -q boto3 urllib3 &&
              aws s3 cp s3://$S3_BUCKET/scripts/fargate_downloader.py /tmp/dl.py &&
              python /tmp/dl.py
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub ["/ecs/${P}-fargate-downloader", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: download

  # ----------------------------------------------------------
  # Lambda: Fargate Trigger (checks pending + launches task)
  # ----------------------------------------------------------
  FargateTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ["${P}-fargate-trigger", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      Runtime: python3.11
      Handler: index.handler
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucketName
          CLUSTER: !Ref DownloaderCluster
          TASK_DEF: !Ref FargateDownloaderTask
          SUBNETS: !Join [',', !Ref FargateSubnetIds]
          SECURITY_GROUP: !GetAtt FargateSecurityGroup.GroupId
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ecs:RunTask
              Resource: !Ref FargateDownloaderTask
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource:
                - !GetAtt FargateExecutionRole.Arn
                - !GetAtt FargateTaskRole.Arn
      Events:
        # Run 30 min after orchestrator to pick up Lambda failures
        FargateSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(30 7 * * ? *)  # UTC 07:30 = NZDT 20:30
            Description: Check for pending large downloads (8:30 PM NZDT)
            State: !If [ShouldEnableSchedules, ENABLED, DISABLED]
      InlineCode: |
        import os, json, boto3

        def handler(event, context):
            s3 = boto3.client('s3')
            bucket = os.environ['S3_BUCKET']

            # Check if any pending downloads exist
            resp = s3.list_objects_v2(
                Bucket=bucket, Prefix='pending_downloads/', MaxKeys=1
            )
            pending_count = resp.get('KeyCount', 0)

            if pending_count == 0:
                print('No pending downloads. Skipping Fargate.')
                return {'triggered': False, 'reason': 'no pending downloads'}

            print(f'Found pending downloads. Launching Fargate task...')

            ecs = boto3.client('ecs')
            subnets = os.environ['SUBNETS'].split(',')

            response = ecs.run_task(
                cluster=os.environ['CLUSTER'],
                taskDefinition=os.environ['TASK_DEF'],
                launchType='FARGATE',
                networkConfiguration={
                    'awsvpcConfiguration': {
                        'subnets': subnets,
                        'securityGroups': [os.environ['SECURITY_GROUP']],
                        'assignPublicIp': 'ENABLED',
                    }
                },
                count=1,
            )

            tasks = response.get('tasks', [])
            if tasks:
                task_arn = tasks[0]['taskArn']
                print(f'Fargate task started: {task_arn}')
                return {'triggered': True, 'task_arn': task_arn}
            else:
                failures = response.get('failures', [])
                print(f'Failed to start task: {failures}')
                return {'triggered': False, 'failures': str(failures)}

  # ----------------------------------------------------------
  # CloudWatch Log Groups
  # ----------------------------------------------------------
  OrchestratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${OrchestratorFunction}
      RetentionInDays: 30

  DownloaderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${DownloaderFunction}
      RetentionInDays: 14

  TranscribeLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ShouldEnableTranscribe
    Properties:
      LogGroupName: !Sub /aws/lambda/${TranscribeFunction}
      RetentionInDays: 14

  ReportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ReportGeneratorFunction}
      RetentionInDays: 30

  VadLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasVadLayer
    Properties:
      LogGroupName: !Sub /aws/lambda/${VadFunction}
      RetentionInDays: 14

  TranscribeCallbackLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ShouldEnableTranscribe
    Properties:
      LogGroupName: !Sub /aws/lambda/${TranscribeCallbackFunction}
      RetentionInDays: 14

  MeetingMinutesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${MeetingMinutesFunction}
      RetentionInDays: 30

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiFunction}
      RetentionInDays: 14

  AskAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AskAgentFunction}
      RetentionInDays: 14

  MigrateLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasDb
    Properties:
      LogGroupName: !Sub /aws/lambda/${MigrateFunction}
      RetentionInDays: 14

  OrgApiLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasOrgApi
    Properties:
      LogGroupName: !Sub /aws/lambda/${OrgApiFunction}
      RetentionInDays: 14

  OrgSeedLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasOrgApi
    Properties:
      LogGroupName: !Sub /aws/lambda/${OrgSeedFunction}
      RetentionInDays: 14

  VoiceWsAuthorizerLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${VoiceWsAuthorizerFunction}
      RetentionInDays: 14

  WsConnectLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${WsConnectFunction}
      RetentionInDays: 14

  WsDisconnectLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${WsDisconnectFunction}
      RetentionInDays: 14

  WsSendVoiceLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${WsSendVoiceFunction}
      RetentionInDays: 14

  VoiceResolveLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${VoiceResolveFunction}
      RetentionInDays: 14

  VoiceFanoutLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${VoiceFanoutFunction}
      RetentionInDays: 14

  VoiceReaperLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasSiteVoice
    Properties:
      LogGroupName: !Sub /aws/lambda/${VoiceReaperFunction}
      RetentionInDays: 14

  FargateLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ["/ecs/${P}-fargate-downloader", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      RetentionInDays: 14

  FargateTriggerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FargateTriggerFunction}
      RetentionInDays: 14

  # ----------------------------------------------------------
  # SNS Topic for Alerts
  # ----------------------------------------------------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Condition: ShouldCreateAlerts
    Properties:
      TopicName: !Sub ["${P}-pipeline-alerts", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # ----------------------------------------------------------
  # CloudWatch Alarms
  # ----------------------------------------------------------
  OrchestratorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: ShouldCreateAlerts
    Properties:
      AlarmName: !Sub ["${P}-orchestrator-errors", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AlarmDescription: Orchestrator Lambda has errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref OrchestratorFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic

  DownloaderErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: ShouldCreateAlerts
    Properties:
      AlarmName: !Sub ["${P}-downloader-errors", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AlarmDescription: Downloader Lambda has more than 5 errors in a day
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DownloaderFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic

  ReportErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: ShouldCreateAlerts
    Properties:
      AlarmName: !Sub ["${P}-report-errors", {P: !FindInMap [StageConfig, !Ref Stage, Prefix]}]
      AlarmDescription: Report Generator Lambda has errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReportGeneratorFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic

# ============================================================
# Outputs
# ============================================================
Outputs:
  BucketName:
    Description: S3 bucket name
    Value: !Ref DataBucketName

  OrchestratorFunctionArn:
    Description: Orchestrator Lambda ARN
    Value: !GetAtt OrchestratorFunction.Arn

  DownloaderFunctionArn:
    Description: Downloader Lambda ARN
    Value: !GetAtt DownloaderFunction.Arn

  TranscribeFunctionArn:
    Description: Transcribe Lambda ARN
    Condition: ShouldEnableTranscribe
    Value: !GetAtt TranscribeFunction.Arn

  ReportGeneratorFunctionArn:
    Description: Report Generator Lambda ARN
    Value: !GetAtt ReportGeneratorFunction.Arn

  VadFunctionArn:
    Description: VAD Lambda ARN
    Condition: HasVadLayer
    Value: !GetAtt VadFunction.Arn

  TranscribeCallbackFunctionArn:
    Description: Transcribe Callback Lambda ARN
    Condition: ShouldEnableTranscribe
    Value: !GetAtt TranscribeCallbackFunction.Arn

  MeetingMinutesFunctionArn:
    Description: Meeting Minutes Lambda ARN
    Value: !GetAtt MeetingMinutesFunction.Arn

  ApiFunctionArn:
    Description: API Lambda ARN
    Value: !GetAtt ApiFunction.Arn

  AskAgentFunctionArn:
    Description: Ask Agent Lambda ARN
    Value: !GetAtt AskAgentFunction.Arn

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${FieldSightApi}.execute-api.${AWS::Region}.amazonaws.com/prod/api

  VoiceWsEndpoint:
    Description: Site Voice WebSocket endpoint (wss)
    Condition: HasSiteVoice
    Value: !Sub wss://${VoiceWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID (for frontend)
    Value: !Ref UserPoolClient

  CognitoDomain:
    Description: Cognito hosted UI domain
    Value: !Sub ["https://${D}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com", {D: !FindInMap [StageConfig, !Ref Stage, Domain]}]

  FargateClusterArn:
    Description: ECS Cluster for large file downloads
    Value: !GetAtt DownloaderCluster.Arn

  FargateTaskDefArn:
    Description: Fargate task definition ARN
    Value: !Ref FargateDownloaderTask

  ConsoleUrl:
    Description: View S3 bucket in console
    Value: !Sub https://s3.console.aws.amazon.com/s3/buckets/${DataBucketName}

  LogsUrl:
    Description: View Orchestrator logs
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/$252Faws$252Flambda$252Ffieldsight-orchestrator

  FargateLogsUrl:
    Description: View Fargate download logs
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/$252Fecs$252Ffieldsight-fargate-downloader

  MonitoringDashboard:
    Description: Quick monitoring links
    Value: !Sub >
      Lambda: https://${AWS::Region}.console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions
      Logs: https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups
      ECS: https://${AWS::Region}.console.aws.amazon.com/ecs/v2/clusters/fieldsight-downloader-cluster
      Alarms: https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#alarmsV2:
