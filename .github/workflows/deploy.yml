name: Deploy FieldSight TEST (SAM)

# ============================================================
# develop → TEST stack (fieldsight-test) via full SAM deploy.
#
# PROD is NOT deployed by SAM: the prod backend was hand-assembled
# (shared IAM role, EventBridge Scheduler crons, manual API Gateway —
# no CloudFormation stack), so `sam deploy` would collide with it.
# Prod code updates are handled by deploy-prod-code.yml instead.
# ============================================================
# Canonical template: src/template.yaml (built with base_dir "." via samconfig).
# All env params are passed explicitly so a TEST deploy can never touch PROD data.
# ============================================================

on:
  workflow_dispatch:        # manual "Run workflow" button (Actions tab, after merge)
  push:
    branches: [develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'ui/**'          # UI is deployed by Amplify (amplify.yml), not SAM
      - 'frontend/**'    # legacy frontend, not deployed here

permissions:
  id-token: write   # OIDC → AWS, no stored keys
  contents: read

env:
  AWS_REGION: ap-southeast-2

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/setup-sam@v2
        with: { use-installer: true }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }  # must match Lambda runtime: PsycopgLayer BuildMethod python3.11 needs a 3.11 binary

      - name: SAM validate
        run: sam validate --template-file src/template.yaml --lint --region ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build --template-file src/template.yaml --base-dir .

      - name: SAM deploy (TEST)
        env:
          REALPTT_ACCOUNT: ${{ secrets.REALPTT_ACCOUNT }}
          REALPTT_PASSWORD: ${{ secrets.REALPTT_PASSWORD }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          FARGATE_SUBNET_IDS: ${{ secrets.FARGATE_SUBNET_IDS }}
          FARGATE_VPC_ID: ${{ secrets.FARGATE_VPC_ID }}
        run: |
          # A space inside any --parameter-overrides "Key=Value" breaks SAM's parser.
          # Trim the VPC id; normalize the subnet list (space- OR comma-separated) to clean commas.
          VPC="$(echo "$FARGATE_VPC_ID" | xargs)"
          SUBNETS="$(echo "$FARGATE_SUBNET_IDS" | tr ',' ' ' | xargs | tr ' ' ',')"
          # DB secret ARN: read from the db stack's export; passed as a plain
          # parameter because {{resolve:secretsmanager:...}} can't compose
          # with Fn::ImportValue (only with Parameters).
          DB_SECRET_ARN="$(aws cloudformation list-exports --query "Exports[?Name=='fieldsight-db-test-SecretArn'].Value" --output text)"
          sam deploy --config-env test \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Stage=test" \
              "DataBucketName=fieldsight-data-test-509194952652" \
              "EnableSchedules=false" \
              "ItemsTableName=fieldsight-test-items" \
              "ReportsTableName=fieldsight-test-reports" \
              "AuditTableName=fieldsight-test-audit" \
              "RealPTTAccount=$REALPTT_ACCOUNT" \
              "RealPTTPassword=$REALPTT_PASSWORD" \
              "ClaudeApiKey=$CLAUDE_API_KEY" \
              "FargateSubnetIds=$SUBNETS" \
              "FargateVpcId=$VPC" \
              "DbStackName=fieldsight-db-test" \
              "DbSubnetIds=subnet-082dd4480f7e20014,subnet-08b15b36113e542d4,subnet-05fb05613cf529121" \
              "DbSecretArn=$DB_SECRET_ARN" \
              "OrgUserPoolArn=arn:aws:cognito-idp:ap-southeast-2:509194952652:userpool/ap-southeast-2_q88pd6XXr"

      - name: Wire S3 events (TEST bucket)
        run: bash scripts/wire-s3-events.sh fieldsight-data-test-509194952652 test ${{ env.AWS_REGION }} --apply

      # Phase 3: browsers PUT org-assets (avatars / site icons) straight to S3
      # via presigned URLs — that's a cross-origin call, so the bucket needs CORS.
      - name: Wire bucket CORS for org-assets (TEST bucket)
        run: bash scripts/wire-bucket-cors.sh fieldsight-data-test-509194952652 ${{ env.AWS_REGION }}

      - name: Smoke test /api/health (TEST)
        run: bash scripts/smoke-test.sh fieldsight-test ${{ env.AWS_REGION }}
